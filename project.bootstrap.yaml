version: 1
project:
  name: Screensaver
  description: A macOS screensaver that simulates a split-flap mechanical display - the classic
    flip-card style found in airports and train stations. Built in Swift.
  visibility: public
  owner: OMT-Global
  defaultBranch: main
repo:
  managedPaths:
    - project.bootstrap.yaml
    - AGENTS.md
    - CLAUDE.md
    - CODEOWNERS
    - .githooks/**
    - .devcontainer/**
    - .github/workflows/pr-fast-ci.yml
    - .github/workflows/extended-validation.yml
    - .github/workflows/claude.yml
    - scripts/check-detect-secrets.sh
    - scripts/ci/**
    - scripts/codex-cloud/**
    - scripts/claude-cloud/**
    - scripts/claude/**
    - docs/bootstrap/**
archetype:
  kind: generic-empty
  packageManager: npm
  moduleName: screensaver
github:
  createRepo: false
  reviewers:
    - jmcte
  codeowners:
    - pattern: "*"
      owners:
        - "@jmcte"
  issueLabels:
    - name: area:frontend
      color: 1f77b4
      description: Frontend and user-interface work.
    - name: area:api
      color: 2ca02c
      description: API contracts, endpoints, and integrations.
    - name: area:data
      color: 9467bd
      description: Data models, persistence, migration, and analytics work.
    - name: area:ledger
      color: 8c564b
      description: Ledger, accounting, transaction, or reconciliation work.
    - name: area:rules
      color: bcbd22
      description: Domain rules, policy logic, and decision engines.
    - name: area:ai
      color: 17becf
      description: AI, agents, prompts, and model integration work.
    - name: area:infra
      color: 7f7f7f
      description: Infrastructure, CI, deployment, and operations work.
    - name: area:security
      color: d62728
      description: Security-sensitive implementation or hardening work.
    - name: area:accessibility
      color: e377c2
      description: Accessibility and inclusive UX work.
    - name: area:qa
      color: ff7f0e
      description: Quality assurance, test coverage, and release validation.
    - name: risk:low
      color: 0e8a16
      description: Low implementation or operational risk.
    - name: risk:medium
      color: fbca04
      description: Moderate implementation or operational risk.
    - name: risk:high
      color: d93f0b
      description: High implementation or operational risk.
    - name: risk:domain
      color: "5319e7"
      description: Domain correctness risk requiring subject-matter review.
    - name: risk:security
      color: b60205
      description: Security risk requiring explicit review.
    - name: risk:prod
      color: "000000"
      description: Production impact or rollout risk.
    - name: status:needs-spec
      color: cfd3d7
      description: Needs clearer scope, acceptance criteria, or constraints.
    - name: status:ready-for-agent
      color: 0e8a16
      description: Ready for assigned agent implementation.
    - name: status:agent-building
      color: 1d76db
      description: Agent implementation is in progress.
    - name: status:needs-review
      color: fbca04
      description: Needs review before merge or closure.
    - name: status:needs-human-approval
      color: d93f0b
      description: Needs explicit human approval before proceeding.
    - name: status:ready-to-merge
      color: 0e8a16
      description: Ready to merge after required checks pass.
    - name: status:blocked
      color: b60205
      description: Blocked by a dependency, decision, credential, or access gate.
    - name: review:product
      color: 0052cc
      description: Needs product review.
    - name: review:architecture
      color: "5319e7"
      description: Needs architecture review.
    - name: review:security
      color: b60205
      description: Needs security review.
    - name: review:tax
      color: d4c5f9
      description: Needs tax review.
    - name: review:legal
      color: c2e0c6
      description: Needs legal review.
    - name: review:accessibility
      color: e99695
      description: Needs accessibility review.
    - name: review:release
      color: f9d0c4
      description: Needs release review.
  flowGovernance: false
  autoMerge: true
  deleteBranchOnMerge: true
  requiredApprovals: 1
  requiredStatusChecks:
    - CI Gate
  dismissStaleReviews: true
  requireCodeOwnerReviews: true
  requireLastPushApproval: false
  enforceLinearHistory: true
  allowMergeCommit: true
  allowSquashMerge: true
  allowRebaseMerge: true
  repoFeatures:
    hasIssues: true
    hasProjects: false
    hasWiki: false
    hasDiscussions: false
ci:
  runnerPolicy: hybrid-safe
  nodeVersion: "20"
  pythonVersion: "3.12"
  fastChecks:
    - secrets
  extendedChecks:
    - template-review
  nightlyCron: 0 7 * * *
  additionalWorkflows: []
  appPaths:
    - SplitFlap/**
    - SplitFlap.xcodeproj/**
  ciPaths: []
  extendedPaths: []
  macosCheck:
    enabled: true
    paths:
      - SplitFlap/**
      - SplitFlap.xcodeproj/**
    runsOn:
      - self-hosted
      - private
      - macOS
      - ARM64
      - xcode
    command: |
      xcodebuild \
        -project SplitFlap.xcodeproj \
        -scheme SplitFlap \
        -configuration Release \
        -derivedDataPath build \
        ONLY_ACTIVE_ARCH=NO \
        build
  customScripts:
    fast: >
      if command -v xcodebuild >/dev/null 2>&1; then
        echo "Running SplitFlap fast checks via xcodebuild."
        xcodebuild \
          -project SplitFlap.xcodeproj \
          -scheme SplitFlap \
          -configuration Release \
          -derivedDataPath build \
          ONLY_ACTIVE_ARCH=NO \
          build
      else
        echo "xcodebuild is unavailable on this runner; skipping the macOS build step."
        echo "SplitFlap must be validated on a macOS runner before release."
      fi


      if grep -q 'DispatchQueue\.main\.asyncAfter' SplitFlap/DisplayClock.swift; then
        echo "DisplayClock must not schedule wave work with DispatchQueue.main.asyncAfter."
        exit 1
      fi


      awk '
        /(static let|static var|lazy var).*DateFormatter/ {
          in_cached_formatter = 1
        }
        /(Foundation\.)?DateFormatter[[:space:]]*\(/ && !in_cached_formatter {
          print "DisplayClock must cache DateFormatter instances instead of constructing them on the tick path."
          exit 1
        }
        in_cached_formatter && /^[[:space:]]*}\(\)/ {
          in_cached_formatter = 0
        }
      ' SplitFlap/DisplayClock.swift


      if ! grep -q 'let dimensionsChanged =' SplitFlap/CharacterGrid.swift; then
        echo "CharacterGrid must distinguish grid dimension changes from same-grid resizes."
        exit 1
      fi


      if ! grep -q 'panel.resize(to: ps, scale: scale)' SplitFlap/CharacterGrid.swift; then
        echo "CharacterGrid must resize existing panels when grid dimensions are unchanged."
        exit 1
      fi


      if ! grep -q 'func resize(to size: CGSize, scale: CGFloat)' SplitFlap/SplitFlapPanel.swift;
      then
        echo "SplitFlapPanel must expose a layer-preserving resize path."
        exit 1
      fi


      if grep -q 'CATextLayer\|NSBitmapImageRep' SplitFlap/SplitFlapPanel.swift; then
        echo "SplitFlapPanel must use pre-rendered IOSurface glyph contents instead of text layers or bitmap reps."
        exit 1
      fi


      if ! grep -q 'import IOSurface' SplitFlap/SplitFlapPanel.swift; then
        echo "SplitFlapPanel must render cached glyph contents through IOSurface."
        exit 1
      fi
    extended: |
      bash scripts/ci/run-fast-checks.sh
      echo "No extended checks configured for the generic archetype yet."
    releaseVerification: |
      if ! command -v xcodebuild >/dev/null 2>&1; then
        echo "xcodebuild is required for SplitFlap release verification." >&2
        exit 1
      fi

      xcodebuild \
        -project SplitFlap.xcodeproj \
        -scheme SplitFlap \
        -configuration Release \
        -derivedDataPath build \
        ONLY_ACTIVE_ARCH=NO \
        build

      bash scripts/ci/run-fast-checks.sh
  dependabot:
    enabled: true
    securityUpdates: true
    versionUpdates: true
    ecosystems:
      - packageEcosystem: npm
        directory: /
        interval: weekly
        groupMinorAndPatch: true
        ignoreMajorUpdates: true
      - packageEcosystem: github-actions
        directory: /
        interval: weekly
        groupMinorAndPatch: false
        ignoreMajorUpdates: true
  aiAttestation:
    enabled: false
    artifactName: ai-attestation
    retentionDays: 90
    provider: unknown
    model: unknown
    promptHash: unknown
    reusableWorkflowRepo: OMT-Global/bootstrap
    reusableWorkflowRef: refs/heads/main
release:
  enabled: true
  maturity: simple
  tagPrefix: v
  createGitHubRelease: true
  updateMajorTag: true
  updateMinorTag: true
  reusableWorkflowRepo: OMT-Global/bootstrap
  reusableWorkflowRef: refs/heads/main
  changelog:
    enabled: true
    mode: github-generated-notes
    categories:
      - title: Features
        labels:
          - type:feature
      - title: Fixes
        labels:
          - type:bug
      - title: Operations
        labels:
          - area:infra
          - area:qa
      - title: Documentation
        labels:
          - kind:docs
          - documentation
  versions: []
  artifacts:
    directory: dist/release
    checksum: sha256
    sbom: optional
  publish:
    githubReleaseAssets: true
    packages: []
    containers: []
agents:
  manageCodexHome: true
  codexProfile: default
  sharedSkills: []
environments:
  dev:
    reviewers: []
    requireApproval: false
    preventSelfReview: false
    branches: []
  stage:
    reviewers:
      - jmcte
    requireApproval: true
    preventSelfReview: true
    branches: []
  prod:
    reviewers:
      - jmcte
    requireApproval: true
    preventSelfReview: true
    branches:
      - main
